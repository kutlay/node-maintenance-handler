apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: nodemaintenances.maintenance.linode.com
spec:
  group: maintenance.linode.com
  names:
    kind: NodeMaintenance
    listKind: NodeMaintenanceList
    plural: nodemaintenances
    singular: nodemaintenance
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.linodeID
      name: LinodeID
      type: integer
    - jsonPath: .spec.scheduledAt
      name: Window
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          NodeMaintenance is the Schema for the nodemaintenances API.
          One NodeMaintenance object exists per Kubernetes Node that has an upcoming
          Linode maintenance event within the configured look-ahead window.
          The object is cluster-scoped (matching the scope of the Node resource) so
          that Kubernetes garbage collection via ownerReferences works correctly.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of NodeMaintenance.
            properties:
              entity:
                description: Entity describes the Linode entity subject to maintenance.
                properties:
                  id:
                    description: ID is the entity's numeric ID (same as LinodeID for
                      Linode instances).
                    format: int64
                    type: integer
                  label:
                    description: Label is the human-readable label of the Linode instance.
                    type: string
                  type:
                    description: Type is the entity type, e.g. "linode".
                    type: string
                  url:
                    description: URL is the API URL for this entity.
                    type: string
                required:
                - id
                - label
                - type
                type: object
              linodeID:
                description: |-
                  LinodeID is the numeric Linode instance ID extracted from the Node's
                  spec.providerID field (format: "linode://<id>"). Immutable after creation.
                format: int64
                minimum: 1
                type: integer
              maintenanceType:
                description: |-
                  MaintenanceType is the type of maintenance as returned by the Linode API
                  (e.g. "reboot"). Informational only.
                type: string
              maintenanceWindow:
                default: 24h
                description: |-
                  MaintenanceWindow is the look-ahead duration. If the scheduled maintenance
                  falls within this duration from now, signals are applied to the Node.
                  Defaults to 24h if not set.
                type: string
              nodeName:
                description: |-
                  NodeName is the name of the Kubernetes Node this maintenance is associated with.
                  Immutable after creation.
                type: string
              scheduledAt:
                description: |-
                  ScheduledAt is the time the Linode maintenance window begins,
                  as reported by the Linode maintenance API. Immutable after creation.
                format: date-time
                type: string
              wasSchedulable:
                description: |-
                  WasSchedulable records whether the Node was schedulable
                  (spec.unschedulable == false) at the time this NodeMaintenance was created.
                  Used to decide whether to uncordon the node after maintenance ends.
                  Immutable after creation.
                type: boolean
            required:
            - linodeID
            - nodeName
            - scheduledAt
            - wasSchedulable
            type: object
          status:
            description: status defines the observed state of NodeMaintenance.
            properties:
              conditions:
                description: |-
                  Conditions contains standard Kubernetes condition fields for
                  machine-readable status (e.g. for NHC/SNR integration).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                description: |-
                  LastSyncTime is the last time the poller successfully synced this object
                  against the Linode API. The reconciler uses this as the reference time for
                  post-maintenance uncordon delays.
                format: date-time
                type: string
              nodeConditionApplied:
                description: |-
                  NodeConditionApplied indicates the UpcomingMaintenance node condition
                  has been successfully written to the Node.
                type: boolean
              nodeLabelApplied:
                description: NodeLabelApplied indicates the maintenance labels have
                  been applied to the Node.
                type: boolean
              nodeTaintApplied:
                description: NodeTaintApplied indicates the NoSchedule taint has been
                  applied to the Node.
                type: boolean
              phase:
                description: Phase is the current lifecycle phase of this maintenance.
                enum:
                - Pending
                - Active
                - Completed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
